name: Release
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to rebuild binaries + refresh formula"
        required: true
permissions:
  contents: write
jobs:
  release:
    uses: jhheider/rust-ci/.github/workflows/release.yml@v1
    with:
      bin-name: penknife
      tag: ${{ github.event.inputs.tag }}
      include-files: "README.md ABOUT.md LICENSE"
      publish-crates: true
      crates: "penknife-backend penknife-gist penknife"
      tap-repo: jhheider/homebrew-tap
      tap-formula: Formula/penknife.rb
      targets: |
        {"include": [
          {"os":"ubuntu-latest","target":"x86_64-unknown-linux-musl","asset":"penknife-linux-x86_64.tar.gz"},
          {"os":"ubuntu-latest","target":"aarch64-unknown-linux-musl","asset":"penknife-linux-aarch64.tar.gz"},
          {"os":"macos-latest","target":"x86_64-apple-darwin","asset":"penknife-macos-x86_64.tar.gz"},
          {"os":"macos-latest","target":"aarch64-apple-darwin","asset":"penknife-macos-aarch64.tar.gz"},
          {"os":"windows-latest","target":"x86_64-pc-windows-msvc","asset":"penknife-windows-x86_64.zip"}
        ]}
    secrets: inherit
