name: Release

# Publish a release with `gh release create vX.Y.Z --generate-notes` (versions
# already committed). The workflow_dispatch path rebuilds an existing release's
# binaries and refreshes the tap formula, without re-publishing crates.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to rebuild binaries + refresh formula (e.g. v0.2.1)"
        required: true

jobs:
  release:
    uses: jhheider/rust-ci/.github/workflows/release.yml@v1
    with:
      bin-name: penknife
      tag: ${{ github.event.inputs.tag }}
      include-files: "README.md ABOUT.md LICENSE"
      publish-crates: true
      crates: "penknife-backend penknife-gist penknife"
      tap-repo: jhheider/homebrew-tap
      tap-formula: Formula/penknife.rb
      targets: |
        [
          {"os":"ubuntu-latest","target":"x86_64-unknown-linux-gnu","asset":"penknife-linux-x86_64.tar.gz"},
          {"os":"ubuntu-latest","target":"aarch64-unknown-linux-gnu","asset":"penknife-linux-aarch64.tar.gz"},
          {"os":"macos-latest","target":"x86_64-apple-darwin","asset":"penknife-macos-x86_64.tar.gz"},
          {"os":"macos-latest","target":"aarch64-apple-darwin","asset":"penknife-macos-aarch64.tar.gz"},
          {"os":"windows-latest","target":"x86_64-pc-windows-msvc","asset":"penknife-windows-x86_64.zip"}
        ]
    secrets: inherit
