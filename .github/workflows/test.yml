on:
  pull_request:
    paths-ignore: ["**.md", "LICENSE*", ".gitignore"]
  push:
    branches:
      - main
    paths-ignore: ["**.md", "LICENSE*", ".gitignore"]

name: Test

# Cancel a superseded in-progress run when a new commit lands on the same ref
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust"
          shared-key: "debug"
          cache-targets: true
          cache-all-crates: true
      - name: Test
        run: cargo test --workspace --all-features

  coverage:
    name: Coverage
    # Main-only: the instrumented rebuild duplicates the test compile, so PRs
    # skip it (they still run fmt/clippy and the full test matrix).
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust"
          shared-key: "coverage"
          cache-targets: true
          cache-all-crates: true
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage report
        run: |
          mkdir -p coverage
          cargo llvm-cov --workspace --all-features --lcov --output-path coverage/lcov.info
      # The upload is advisory: the repo not yet being enrolled on
      # coveralls.io (or an outage there) must not redden CI - the lcov
      # generation above already gates real failures.
      - uses: coverallsapp/github-action@v2
        with:
          path-to-lcov: coverage/lcov.info
          fail-on-error: false
