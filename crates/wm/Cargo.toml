[package]
name = "wm"
version = "0.1.0"
edition = "2024"

[dependencies]
gist-rs = { path = "../gist-rs" }
ratatui = "0.30"
crossterm = "0.29"
tui-tree-widget = "0.24"
tokio = { workspace = true, features = ["full"] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
