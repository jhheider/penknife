hex = "0.4"
sha2 = "0.11"
similar = "3"
arboard = "3"
open = "5"
nucleo-matcher = "0.3"
chrono = { workspace = true, features = ["serde"] }
thiserror = { workspace = true }
color-eyre = "0.6"
reqwest = { workspace = true, features = ["json"] }
